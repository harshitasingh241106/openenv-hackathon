name: customer-support-ticket-router
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent reads customer support tickets
  and must correctly route them by department, urgency, and suggested reply.

author: Harshita Singh
tags:
  - customer-support
  - nlp
  - routing
  - real-world

tasks:
  - id: task1
    name: Department Routing
    difficulty: easy
    description: Route the ticket to the correct department
    score_range: [0.0, 1.0]

  - id: task2
    name: Department and Urgency Classification
    difficulty: medium
    description: Route the ticket and classify urgency level
    score_range: [0.0, 1.0]

  - id: task3
    name: Full Ticket Handling
    difficulty: hard
    description: Route, classify urgency, and generate a suggested reply
    score_range: [0.0, 1.0]

  - id: task4
    name: Expert Escalation Manager
    difficulty: expert
    description: Route, classify urgency, decide escalation, give reason, and write reply
    score_range: [0.0, 1.0]

entrypoint: environment.py
api:
  reset: /reset
  step: /step
  state: /state

observation_space:
  ticket_id: string
  ticket_text: string
  task_number: integer
  prompt: string
  steps_taken: integer
  done: boolean

action_space:
  response: string

reward:
  min: 0.0
  max: 1.0
  partial_credit: true